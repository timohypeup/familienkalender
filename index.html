<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familienkalender</title>
  <style>
    /* ========================================================
       FAMILIENKALENDER — optimiert fuer Echo Show 15
       ======================================================== */

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #000000;
    }

    .calendar {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 3.5rem);
      padding: 0.6rem 1.2rem;
    }

    /* --- Header --- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 0.8rem;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 0.8rem;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .header-week {
      font-size: 1.3rem;
      opacity: 0.7;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .legend {
      display: flex;
      gap: 1.2rem;
      font-size: 1.1rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .clock {
      font-size: 1.8rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* --- Kalender-Grid --- */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: auto auto 1fr;
      gap: 0 0.4rem;
      flex: 1;
      min-height: 0;
    }

    /* Tagesheader-Zeile */
    .day-header {
      text-align: center;
      padding: 0.4rem 0.2rem;
      background: rgba(0,0,0,0.05);
      border-radius: 8px 8px 0 0;
    }

    .day-header.today {
      background: #e94560;
      color: #fff;
    }

    .day-name {
      font-size: 1.4rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .day-date {
      font-size: 1rem;
      opacity: 0.6;
      margin-top: 0.1rem;
    }

    .day-header.today .day-date {
      opacity: 0.9;
    }

    /* Ganztaegige Zeile */
    .allday-cell {
      background: #f5f5f5;
      padding: 0.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      min-height: 2rem;
      border-left: 1px solid #e8e8e8;
      border-right: 1px solid #e8e8e8;
      border-bottom: 2px solid #ddd;
    }

    /* Zeitspalte — proportionale Darstellung */
    .time-column {
      position: relative;
      background: #f9f9f9;
      border-left: 1px solid #e8e8e8;
      border-right: 1px solid #e8e8e8;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
    }

    .time-column.today-col {
      outline: 2px solid #e94560;
      outline-offset: -1px;
    }

    /* Zeitlinien bei 12:00 und 18:00 */
    .time-line {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px dashed #ddd;
      z-index: 1;
      pointer-events: none;
    }

    /* --- Events --- */
    .event {
      border-radius: 5px;
      padding: 0.2rem 0.35rem;
      font-size: 0.9rem;
      line-height: 1.2;
      color: #fff;
      overflow: hidden;
    }

    .event-time {
      font-size: 0.7rem;
      opacity: 0.85;
      font-weight: 600;
    }

    .event-title {
      font-weight: 500;
      word-break: break-word;
    }

    .event.all-day {
      font-weight: 600;
      text-align: center;
    }

    /* Zeitbasierte Events — absolute Positionierung */
    .event-timed {
      position: absolute;
      z-index: 2;
      min-height: 1.4rem;
    }

    /* --- Ladescreen / Fehler --- */
    .loading, .error {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      background: #ffffff;
      z-index: 10;
    }

    .error {
      color: #e94560;
      flex-direction: column;
      gap: 1rem;
    }

    .error-detail {
      font-size: 1rem;
      opacity: 0.7;
      max-width: 80%;
      text-align: center;
    }

    .overflow-hint {
      font-size: 0.8rem;
      opacity: 0.5;
      text-align: center;
      padding: 0.2rem;
    }

    /* --- Navigation --- */
    .nav {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .nav-btn {
      background: #f0f0f0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1.5rem;
      font-weight: 700;
      width: 3rem;
      height: 3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:active {
      background: #ddd;
    }

    .nav-btn-heute {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
      font-size: 1rem;
      width: auto;
      padding: 0 1rem;
    }

    .nav-btn-heute:active {
      background: #c73650;
    }
  </style>
</head>
<body>

<div class="loading" id="loading">Kalender wird geladen…</div>
<div class="calendar" id="calendar" style="display:none"></div>

<script src="https://cdn.jsdelivr.net/npm/ical.js@1.5.0/build/ical.min.js"></script>
<script>
// ============================================================
// KONFIGURATION — hier anpassen
// ============================================================
const CONFIG = {
  // Kalender-Feeds: Name, ICS-URL und Farbe pro Kalender
  CALENDARS: [
    {
      name: 'Platin & Timo',
      url: 'https://p152-caldav.icloud.com/published/2/MTM0MDAzMzM3MTEzNDAwMxwNOsUmawPH-FkSXm4U6edWYiZU32acENiHbBZPg3k8',
      color: '#3b82f6'
    },
    {
      name: 'Naya',
      url: 'https://p152-caldav.icloud.com/published/2/MTM0MDAzMzM3MTEzNDAwMxwNOsUmawPH-FkSXm4U6ed_3Q3enpwPWlcbZ4_UdjRwJCiYx1s_VPfAMyLYlPwEtpixCPwDTlQekz3SDm4-Ack',
      color: '#67d4f1'
    },
    {
      name: 'DJ Bookings Timo',
      url: 'https://calendar.google.com/calendar/ical/hi%40stinson.media/private-7a505876fe5bd452939118e1a50c98b8/basic.ics',
      color: '#a855f7'
    }
  ],

  // CORS-Proxy — iCloud/Google blockieren direkte Browser-Requests.
  // Eigenen Cloudflare Worker deployen (siehe worker.js + README.md).
  // Format: Worker-URL + '?url=' → die ICS-URL wird als Parameter angehaengt.
  CORS_PROXY: 'https://kalender-proxy.hi-679.workers.dev/?url=',

  // Wochenstart: 0 = Sonntag, 1 = Montag
  WEEK_START: 1,

  // Seite alle 4 Minuten neu laden (haelt den Echo Show aktiv)
  REFRESH_INTERVAL: 240000,

  // Farbschema
  THEME: {
    bg: '#ffffff',
    text: '#000000',
    today: '#e94560',
    grid: '#f5f5f5'
  }
};

// ============================================================
// AB HIER NICHTS AENDERN (es sei denn, du weisst was du tust)
// ============================================================

let weekOffset = 0; // 0 = aktuelle Woche, -1 = letzte, +1 = naechste
let cachedCalendarData = null; // ICS-Daten zwischenspeichern

const DAYS_DE = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];
const MONTHS_DE = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];

// --- Hilfsfunktionen ---

function getWeekBounds(now, offset) {
  const start = new Date(now);
  const day = start.getDay();
  const diff = (day - CONFIG.WEEK_START + 7) % 7;
  start.setDate(start.getDate() - diff + (offset || 0) * 7);
  start.setHours(0, 0, 0, 0);

  const end = new Date(start);
  end.setDate(end.getDate() + 7);
  return { start, end };
}

function getKW(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}

function formatTime(date) {
  return date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function formatDate(date) {
  return date.getDate() + '. ' + MONTHS_DE[date.getMonth()];
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth() === b.getMonth() &&
         a.getDate() === b.getDate();
}

// --- ICS laden und parsen ---

async function fetchCalendar(cal) {
  const url = CONFIG.CORS_PROXY + encodeURIComponent(cal.url);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Fehler beim Laden von "${cal.name}": ${resp.status}`);
  const text = await resp.text();
  return { text, cal };
}

function parseEvents(icsText, calInfo, weekStart, weekEnd) {
  const events = [];
  const jcal = ICAL.parse(icsText);
  const comp = new ICAL.Component(jcal);
  const vevents = comp.getAllSubcomponents('vevent');

  for (const vevent of vevents) {
    const event = new ICAL.Event(vevent);

    if (event.isRecurring()) {
      // Wiederkehrende Termine expandieren
      const iter = event.iterator();
      let next;
      let safety = 0;
      while ((next = iter.next()) && safety < 500) {
        safety++;
        const occStart = next.toJSDate();
        if (occStart >= weekEnd) break;

        const duration = event.duration;
        const occEnd = new Date(occStart.getTime() + duration.toSeconds() * 1000);
        if (occEnd <= weekStart) continue;

        const isAllDay = next.isDate;
        events.push({
          title: event.summary || '(Kein Titel)',
          start: occStart,
          end: occEnd,
          allDay: isAllDay,
          color: calInfo.color,
          calName: calInfo.name
        });
      }
    } else {
      const dtstart = event.startDate;
      const dtend = event.endDate;
      if (!dtstart) continue;

      const start = dtstart.toJSDate();
      const end = dtend ? dtend.toJSDate() : new Date(start.getTime() + 3600000);

      if (start >= weekEnd || end <= weekStart) continue;

      events.push({
        title: event.summary || '(Kein Titel)',
        start,
        end,
        allDay: dtstart.isDate,
        color: calInfo.color,
        calName: calInfo.name
      });
    }
  }

  return events;
}

// --- Rendern ---

function render(allEvents, now) {
  const { start: weekStart, end: weekEnd } = getWeekBounds(now, weekOffset);
  const kw = getKW(weekStart);

  // Tage der Woche aufbauen
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  const rangeStr = formatDate(days[0]) + ' – ' + formatDate(days[6]);

  // Sichtbarer Zeitbereich (in Stunden) — 6:00 bis 24:00
  const DAY_START_H = 6;
  const DAY_END_H = 24;
  const DAY_SPAN = DAY_END_H - DAY_START_H; // 18 Stunden

  // Zeitlinien bei 12:00 und 18:00
  const TIME_LINES = [12, 18];

  // Events pro Tag aufteilen
  const dayData = days.map(day => {
    const dayStart = new Date(day);
    dayStart.setHours(0, 0, 0, 0);
    const dayEnd = new Date(day);
    dayEnd.setHours(23, 59, 59, 999);

    const dayAllEvents = allEvents.filter(e => {
      if (e.allDay) {
        const evStartDay = new Date(e.start); evStartDay.setHours(0,0,0,0);
        const evEndDay = new Date(e.end); evEndDay.setHours(0,0,0,0);
        return dayStart >= evStartDay && dayStart < evEndDay;
      }
      return e.start < dayEnd && e.end > dayStart;
    });

    const allDayEvents = dayAllEvents.filter(e => e.allDay);
    const timedEvents = dayAllEvents.filter(e => !e.allDay).sort((a,b) => a.start - b.start);

    return { allDayEvents, timedEvents };
  });

  // HTML zusammenbauen
  let html = '';

  // Header
  html += '<div class="header">';
  html += '<div style="display:flex;align-items:center;gap:1rem">';
  html += '<div class="nav">';
  html += '<button class="nav-btn" onclick="navigateWeek(-1)">◀</button>';
  if (weekOffset !== 0) {
    html += '<button class="nav-btn nav-btn-heute" onclick="navigateWeek(0, true)">Heute</button>';
  }
  html += '<button class="nav-btn" onclick="navigateWeek(1)">▶</button>';
  html += '</div>';
  html += '<div>';
  html += `<div class="header-title">Familienkalender</div>`;
  html += `<div class="header-week">KW ${kw} · ${rangeStr}</div>`;
  html += '</div>';
  html += '</div>';
  html += '<div class="header-right">';
  html += '<div class="legend">';
  for (const cal of CONFIG.CALENDARS) {
    html += `<div class="legend-item"><span class="legend-dot" style="background:${cal.color}"></span>${cal.name}</div>`;
  }
  html += '</div>';
  html += `<div class="clock" id="clock">${formatTime(new Date())}</div>`;
  html += '</div>';
  html += '</div>';

  // Hilfsfunktion: Stunden als Prozent im sichtbaren Bereich
  function hourToPercent(h) {
    return Math.max(0, Math.min(100, ((h - DAY_START_H) / DAY_SPAN) * 100));
  }

  // Kalender-Grid: 7 Spalten, 3 Zeilen (Header, Ganztaegig, Zeitspalte)
  html += '<div class="cal-grid">';

  // Zeile 1: Tagesheader
  for (let i = 0; i < 7; i++) {
    const day = days[i];
    const isToday = isSameDay(day, now);
    html += `<div class="day-header${isToday ? ' today' : ''}">`;
    html += `<div class="day-name">${DAYS_DE[day.getDay()]}</div>`;
    html += `<div class="day-date">${day.getDate()}. ${MONTHS_DE[day.getMonth()]}</div>`;
    html += '</div>';
  }

  // Zeile 2: Ganztaegige Termine
  for (let i = 0; i < 7; i++) {
    html += '<div class="allday-cell">';
    for (const ev of dayData[i].allDayEvents) {
      html += `<div class="event all-day" style="background:${ev.color}">`;
      html += `<div class="event-title">${escapeHtml(ev.title)}</div>`;
      html += '</div>';
    }
    html += '</div>';
  }

  // Zeile 3: Zeitspalten mit proportionaler Positionierung
  for (let i = 0; i < 7; i++) {
    const day = days[i];
    const isToday = isSameDay(day, now);
    html += `<div class="time-column${isToday ? ' today-col' : ''}">`;

    // Zeitlinien bei 12:00 und 18:00
    for (const h of TIME_LINES) {
      const pct = hourToPercent(h);
      html += `<div class="time-line" style="top:${pct}%"></div>`;
    }

    // Events proportional positionieren mit Overlap-Handling
    const timedEvs = dayData[i].timedEvents.map(ev => {
      const evStartH = Math.max(DAY_START_H, ev.start.getHours() + ev.start.getMinutes() / 60);
      const evEndH = Math.min(DAY_END_H, ev.end.getHours() + ev.end.getMinutes() / 60 + (ev.end.getDate() !== day.getDate() ? 24 : 0));
      return { ...ev, startH: evStartH, endH: evEndH };
    });

    // Overlap-Gruppen bilden: Events die sich zeitlich ueberschneiden
    const groups = [];
    for (const ev of timedEvs) {
      let placed = false;
      for (const group of groups) {
        if (ev.startH < group.end) {
          group.events.push(ev);
          group.end = Math.max(group.end, ev.endH);
          placed = true;
          break;
        }
      }
      if (!placed) {
        groups.push({ events: [ev], end: ev.endH });
      }
    }

    // Spalten innerhalb jeder Gruppe zuweisen
    for (const group of groups) {
      const columns = [];
      for (const ev of group.events) {
        let col = 0;
        while (columns[col] && columns[col] > ev.startH) {
          col++;
        }
        ev._col = col;
        columns[col] = ev.endH;
      }
      const totalCols = columns.length;
      for (const ev of group.events) {
        ev._totalCols = totalCols;
      }
    }

    for (const ev of timedEvs) {
      const topPct = hourToPercent(ev.startH);
      const heightPct = Math.max(2, hourToPercent(ev.endH) - topPct);
      const colWidth = (100 - 4) / ev._totalCols; // 4% padding gesamt
      const leftPct = 2 + ev._col * colWidth;
      const widthPct = colWidth - 1;

      html += `<div class="event event-timed" style="background:${ev.color};top:${topPct}%;height:${heightPct}%;left:${leftPct}%;width:${widthPct}%">`;
      html += `<div class="event-time">${formatTime(ev.start)} – ${formatTime(ev.end)}</div>`;
      html += `<div class="event-title">${escapeHtml(ev.title)}</div>`;
      html += '</div>';
    }

    html += '</div>';
  }

  html += '</div>';

  document.getElementById('calendar').innerHTML = html;
  document.getElementById('calendar').style.display = 'flex';
  document.getElementById('loading').style.display = 'none';

  // Uhr aktualisieren
  startClock();
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function startClock() {
  const tick = () => {
    const el = document.getElementById('clock');
    if (el) el.textContent = formatTime(new Date());
  };
  setInterval(tick, 30000);
}

// --- Fehleranzeige ---

function showError(msg, detail) {
  document.getElementById('loading').style.display = 'none';
  const el = document.createElement('div');
  el.className = 'error';
  el.innerHTML = `<div>${escapeHtml(msg)}</div>` +
    (detail ? `<div class="error-detail">${escapeHtml(detail)}</div>` : '');
  document.body.appendChild(el);
}

// --- Navigation ---

function navigateWeek(direction, reset) {
  if (reset) {
    weekOffset = 0;
  } else {
    weekOffset += direction;
  }
  renderFromCache();
}

function renderFromCache() {
  if (!cachedCalendarData) return;
  const now = new Date();
  const { start: weekStart, end: weekEnd } = getWeekBounds(now, weekOffset);

  let allEvents = [];
  for (const { text, cal } of cachedCalendarData) {
    try {
      // Fuer Navigation breiten Zeitraum parsen (±6 Monate)
      const wideStart = new Date(now);
      wideStart.setMonth(wideStart.getMonth() - 6);
      const wideEnd = new Date(now);
      wideEnd.setMonth(wideEnd.getMonth() + 6);
      const events = parseEvents(text, cal, wideStart, wideEnd);
      allEvents = allEvents.concat(events);
    } catch (err) {
      console.error(`Parse-Fehler bei "${cal.name}":`, err);
    }
  }

  render(allEvents, now);
}

// --- Start ---

async function fetchAllCalendars() {
  const results = await Promise.allSettled(
    CONFIG.CALENDARS.map(cal => fetchCalendar(cal))
  );

  const calData = [];
  const errors = [];

  for (const result of results) {
    if (result.status === 'fulfilled') {
      calData.push(result.value);
    } else {
      errors.push(result.reason.message);
      console.error('Kalender-Fehler:', result.reason);
    }
  }

  if (calData.length === 0) {
    showError('Kein Kalender konnte geladen werden', errors.join(' | '));
    return;
  }

  cachedCalendarData = calData;
  if (errors.length > 0) {
    console.warn('Einige Kalender konnten nicht geladen werden:', errors);
  }

  renderFromCache();
}

fetchAllCalendars();

// Auto-Refresh: Daten neu laden, Offset beibehalten
setInterval(() => fetchAllCalendars(), CONFIG.REFRESH_INTERVAL);

</script>
</body>
</html>
